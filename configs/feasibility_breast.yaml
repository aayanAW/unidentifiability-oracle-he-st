  n_boot: 200 # bootstrap for per-gene U p-value
  fdr_alpha: 0.05
thresholds: # pre-registered (feasibility.md)
  confirm_fraction: 0.20
  kill_fraction: 0.05
  gap_confirm: 0.10
  gap_kill: 0.05
encoder: MahmoodLab/UNI # real morphology features (Virchow2 as second backbone)
