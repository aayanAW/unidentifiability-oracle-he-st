# Phase 1 feasibility config (breast). Real source locked: GSE243280 GSM7780153 + GSM7780154.
data:
  source: synthetic # synthetic | real
  real_dir: data/
  noise_floor_source: "GSE243280 GSM7780153(Rep1)+GSM7780154(Rep2)" # locked, true technical replicate
oracle:
  n_models: 8 # ensemble size (epistemic via disagreement)
